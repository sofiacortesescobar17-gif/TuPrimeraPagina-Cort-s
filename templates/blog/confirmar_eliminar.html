{% extends "blog/base.html" %}

{% block title %}Eliminar {{ tipo }} — MiBlog{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container">
        <h1><i class="fas fa-exclamation-triangle me-2" style="color: var(--gold);"></i>Confirmar Eliminación</h1>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="form-card text-center">
                <div style="font-size: 3rem; margin-bottom: 1rem;">🗑️</div>
                <h4 style="font-family:'Playfair Display',serif;">
                    ¿Eliminar este {{ tipo|lower }}?
                </h4>
                <p class="text-muted mt-2">
                    Estás por eliminar: <strong>{{ objeto }}</strong>
                </p>
                <p class="text-danger" style="font-size:0.9rem;">
                    <i class="fas fa-exclamation-circle me-1"></i>
                    Esta acción no se puede deshacer.
                </p>

                <hr class="divider">

                <form method="post" class="d-flex gap-2 justify-content-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash me-2"></i>Sí, eliminar
                    </button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary">
                        Cancelar
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
